# SCONIA Google Cloud Build configuration
# Deploys both backend (sconia-api) and frontend (sconia-frontend) to Cloud Run.

steps:
  # ── 1. Build Backend API Image ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-api:${BUILD_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-api:latest'
      - '.'
    id: 'build-backend'

  # ── 2. Build Frontend UI Image ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-frontend:${BUILD_ID}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-frontend:latest'
      - './frontend'
      - '-f'
      - './frontend/Dockerfile.prod'
    id: 'build-frontend'
    waitFor: ['-']

  # ── 3. Push Backend Image ──────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-api:${BUILD_ID}'
    id: 'push-backend'
    waitFor: ['build-backend']

  # ── 4. Push Frontend Image ──────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-frontend:${BUILD_ID}'
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # ── 5. Deploy Backend to Cloud Run ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sconia-api'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-api:${BUILD_ID}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--port=8080'
      - '--add-cloudsql-instances=${PROJECT_ID}:${_REGION}:${_DB_INSTANCE}'
      - '--set-env-vars=ENVIRONMENT=production,DEBUG=False,VECTOR_DB_TYPE=qdrant,RUN_MIGRATIONS=false'
      - '--set-secrets=DATABASE_URL=db-url:latest,QDRANT_URL=qdrant-url:latest,QDRANT_API_KEY=qdrant-key:latest,GEMINI_API_KEY=gemini-key:latest,SECRET_KEY=secret-key:latest'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # ── 6. Deploy Frontend to Cloud Run ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sconia-frontend'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-frontend:${BUILD_ID}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=0.5'
      - '--port=80'
      - '--set-env-vars=BACKEND_URL=https://sconia-api-114876416729.us-central1.run.app'  # Placeholder, set to your API URL
    id: 'deploy-frontend'
    waitFor: ['push-frontend', 'deploy-backend']

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-api:${BUILD_ID}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-api:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-frontend:${BUILD_ID}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sconia-frontend:latest'

substitutions:
  _REGION: 'us-central1'
  _REPOSITORY: 'sconia'
  _DB_INSTANCE: 'sconia-postgres'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1500s'
